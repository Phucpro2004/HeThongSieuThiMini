<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - MiniShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f4f6f9 0%, #e9ecef 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-card .logo {
            text-align: center;
            color: #0d6efd;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
        }
        .input-group-text {
            background-color: transparent;
            border-radius: 8px 0 0 8px;
            border-right: none;
        }
        .input-group .form-control {
            border-left: none;
        }
        .input-group .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        .input-group-text i {
            color: #6c757d;
        }
        .btn-login {
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fa-solid fa-store"></i>
        </div>
        <h3 class="text-center fw-bold mb-4 text-dark">Đăng Nhập</h3>
        
        <div id="loginError" class="alert alert-danger d-none rounded-3 small">
            Sai tên đăng nhập hoặc mật khẩu.
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label text-secondary fw-medium">Tên đăng nhập (Email)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" id="username" required placeholder="Nhập email của bạn...">
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label text-secondary fw-medium">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" required placeholder="Nhập mật khẩu...">
                    <button class="btn btn-outline-secondary border" type="button" id="togglePassword" style="border-left: none; background: transparent; color: #6c757d;">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/security.js"></script>
    <script src="/js/site.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                const response = await axios.post('/api/Auth/login', {
                    username: username,
                    password: password
                });
                
                if (response.data && response.data.token) {
                    const token = response.data.token;
                    localStorage.setItem('token', token);
                    
                    // Decode JWT to get Role
                    const payload = parseJwt(token);
                    const roleClaim = "http://schemas.microsoft.com/ws/2008/06/identity/claims/role";
                    const role = payload ? (payload[roleClaim] || payload.role || 'Cashier') : 'Cashier';
                    
                    if (role === 'Admin') {
                        window.location.href = '/pages/admin-dashboard.html';
                    } else {
                        window.location.href = '/pages/pos.html';
                    }
                }
            } catch (error) {
                console.error('Login error', error);
                errorDiv.classList.remove('d-none');
                if (error.response && error.response.data && error.response.data.message) {
                    errorDiv.innerText = error.response.data.message;
                } else {
                    errorDiv.innerText = 'Đăng nhập thất bại. Vui lòng thử lại.';
                }
            }
        });

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });
    </script>
</body>
</html>
