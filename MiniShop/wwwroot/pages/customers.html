<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khách hàng thân thiết - MiniShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/global-theme.css" />
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Rendered by site.js -->
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="topbar">
                <h3 class="fw-bold mb-0 text-gradient">Quản lý Khách hàng</h3>
                <div class="user-profile d-flex align-items-center">
                    <!-- Rendered by site.js -->
                </div>
            </header>

            <div class="content-wrapper">
                <div class="glass-card mb-4">
                    <div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center" style="border-color: var(--glass-border) !important;">
                        <span class="fs-5 fw-bold text-primary"><i class="fa-solid fa-users me-2"></i>Danh sách Khách hàng</span>
                        <button class="btn btn-success rounded-pill px-3 fw-bold" onclick="showAddCustomerModal()">
                            <i class="fa-solid fa-plus me-1"></i> THÊM KHÁCH HÀNG
                        </button>
                    </div>
                    <div class="p-4">
                <div class="row mb-3">
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-search text-muted"></i></span>
                            <input type="text" id="searchInput" class="form-control border-start-0 bg-light" placeholder="Tìm kiếm theo tên hoặc số điện thoại..." onkeyup="handleSearch(event)">
                        </div>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="customersTable">
                        <thead class="">
                            <tr>
                                <th>Họ tên</th>
                                <th>Số điện thoại</th>
                                <th>Email</th>
                                <th>Địa chỉ</th>
                                <th class="text-center">Điểm tích lũy</th>
                                <th class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- Add Customer Modal -->
    <div class="modal fade" id="addCustomerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title font-weight-bold text-gradient" id="customerModalTitle"><i class="fa-solid fa-user-plus me-2"></i>Thêm Khách hàng mới</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addCustomerForm">
                        <input type="hidden" id="customerId">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Họ và Tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="custFullName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="custPhone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Email</label>
                            <input type="email" class="form-control" id="custEmail">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium">Địa chỉ</label>
                            <input type="text" class="form-control" id="custAddress">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success py-2 fw-bold" id="btnSaveCustomer">Lưu Khách hàng</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/security.js"></script>
    <script src="/js/site.js"></script>
    <script src="/js/customers.js"></script>
</body>
</html>
