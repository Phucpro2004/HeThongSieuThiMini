<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS - Máy Thu Ngân</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/global-theme.css" />
</head>
<body>
    <div class="container-fluid p-0 pos-container">
        <header class="pos-header">
            <div class="d-flex align-items-center">
                <i class="fa-solid fa-store fs-3 text-primary me-2"></i>
                <h4 class="mb-0 fw-bold">POS Thu Ngân</h4>
            </div>
            <!-- site.js applyUnifiedUI() sẽ tự động tiêm Tên và Badge vào đây -->
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                    <i class="fa-solid fa-sign-out-alt"></i> Đăng xuất
                </button>
            </div>
        </header>

        <div class="pos-main">
            <!-- Cột trái 70% -->
            <div class="left-panel">
                <div class="row mb-3">
                    <div class="col-12">
                        <input type="text" id="posSearch" class="form-control search-bar-pos" placeholder="🔍 Nhập tên sản phẩm để tìm kiếm..." onkeyup="filterProducts()">
                    </div>
                </div>
                
                <div class="product-grid" id="posProductGrid">
                    <!-- Sản phẩm render bằng JS -->
                </div>
            </div>

            <!-- Cột phải 30% -->
            <div class="right-panel">
                <!-- Top: Khách hàng -->
                <div class="cart-customer">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user text-muted"></i></span>
                        <input type="text" id="customerPhone" class="form-control" placeholder="SĐT Khách hàng...">
                        <button class="btn btn-outline-primary" onclick="searchCustomer()" title="Tìm kiếm"><i class="fa-solid fa-magnifying-glass"></i></button>
                        <button class="btn btn-success" onclick="showQuickAddModal()" title="Thêm khách hàng mới"><i class="fa-solid fa-user-plus"></i></button>
                    </div>
                    <div id="customerInfo" class="mt-2 small text-success d-none fw-medium">
                        Khách: <span id="customerName" class="text-main"></span> | Điểm: <span id="customerPoints" class="text-warning"></span>
                        <div class="form-check mt-1">
                            <input class="form-check-input" type="checkbox" id="usePointsCheckbox" onchange="updateCartTotals()">
                            <label class="form-check-label text-muted" for="usePointsCheckbox">
                                Sử dụng điểm giảm giá (1 điểm = 1.000 VNĐ)
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Middle: Giỏ hàng -->
                <div class="cart-items" id="cartItemsContainer">
                    <!-- Item render bằng JS -->
                </div>

                <!-- Bottom: Thanh toán -->
                <div class="cart-summary">
                    <div class="d-flex justify-content-between mb-2 fs-5">
                        <span class="fw-bold">TỔNG TIỀN:</span>
                        <strong id="cartTotal" class="text-danger fs-4">0đ</strong>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">Khách đưa:</label>
                        <input type="number" id="amountReceived" class="form-control form-control-lg text-end fw-bold text-success" placeholder="0" onkeyup="calculateChange()">
                    </div>
                    <div class="d-flex justify-content-between mb-3 text-muted">
                        <span>Tiền thừa:</span>
                        <strong id="changeAmount">0đ</strong>
                    </div>
                    <button class="btn-checkout" onclick="checkout()">
                        <i class="fa-solid fa-cart-shopping me-2"></i> THANH TOÁN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Add Customer Modal for POS -->
    <div class="modal fade" id="quickAddCustomerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 12px;">
                <div class="modal-header bg-primary text-white border-0" style="border-radius: 12px 12px 0 0;">
                    <h5 class="modal-title font-weight-bold"><i class="fa-solid fa-user-plus me-2"></i>Khách hàng chưa tồn tại</h5>
                    <button type="button" class="btn-close btn-close-white" onclick="quickAddCustomerModal.hide()" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="text-muted mb-4">Số điện thoại này chưa được đăng ký. Bạn có muốn tạo tài khoản mới để tích điểm cho khách không?</p>
                    <form id="quickAddCustomerForm">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="quickCustPhone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Họ và Tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="quickCustFullName" required placeholder="Nhập tên khách hàng...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Email</label>
                            <input type="email" class="form-control" id="quickCustEmail" placeholder="Nhập email (không bắt buộc)...">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium">Địa chỉ</label>
                            <input type="text" class="form-control" id="quickCustAddress" placeholder="Nhập địa chỉ (không bắt buộc)...">
                        </div>
                        <div class="d-flex justify-content-between gap-2">
                            <button type="button" class="btn btn-outline-secondary w-50 py-2 fw-bold" onclick="quickAddCustomerModal.hide()">
                                Bỏ qua (Không tích điểm)
                            </button>
                            <button type="submit" class="btn btn-success w-50 py-2 fw-bold" id="btnQuickSaveCustomer">
                                Tạo & Chọn Khách
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/security.js"></script>
    <script src="/js/site.js"></script>
    <script src="/js/pos.js?v=3"></script>
</body>
</html>
