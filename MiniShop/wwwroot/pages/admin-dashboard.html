<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - MiniShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #212529;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            color: white;
            z-index: 1000;
        }
        .sidebar .logo {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 15px 25px;
            font-weight: 500;
            transition: 0.3s;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: white;
            background-color: #0d6efd;
            border-right: 4px solid #fff;
        }
        .sidebar .nav-link i {
            width: 25px;
            text-align: center;
            margin-right: 10px;
        }
        
        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        
        /* Stat Cards */
        .stat-card {
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            color: white;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .stat-card .icon-bg {
            position: absolute;
            right: 15px;
            bottom: 15px;
            font-size: 4rem;
            opacity: 0.2;
            z-index: 1;
        }
        .stat-card .card-body {
            position: relative;
            z-index: 2;
        }
        .card-primary { background: linear-gradient(45deg, #0d6efd, #0dcaf0); }
        .card-success { background: linear-gradient(45deg, #198754, #20c997); }
        .card-warning { background: linear-gradient(45deg, #fd7e14, #ffc107); }
        .card-info { background: linear-gradient(45deg, #6f42c1, #d63384); }

        /* Data Card */
        .data-card {
            background: white;
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .data-card .card-header {
            background-color: white;
            border-bottom: 1px solid #eee;
            border-radius: 10px 10px 0 0;
            padding: 20px;
            font-weight: 700;
        }
        
        /* User Profile Header */
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <!-- Rendered by site.js -->
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0 text-dark">Tổng quan hệ thống</h3>
            <div class="user-profile d-flex align-items-center">
                <!-- Rendered by site.js -->
            </div>
        </header>

        <!-- 4 Stat Cards -->
        <div class="row mb-4">
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card stat-card card-primary h-100">
                    <div class="card-body">
                        <h6 class="text-uppercase mb-1 fw-bold">Doanh thu hôm nay</h6>
                        <h3 class="mb-0 fw-bold" id="todayRevenue">0đ</h3>
                        <i class="fa-solid fa-sack-dollar icon-bg"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card stat-card card-success h-100">
                    <div class="card-body">
                        <h6 class="text-uppercase mb-1 fw-bold">Đơn hàng mới</h6>
                        <h3 class="mb-0 fw-bold" id="todayOrders">0</h3>
                        <i class="fa-solid fa-cart-shopping icon-bg"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card stat-card card-warning h-100">
                    <div class="card-body">
                        <h6 class="text-uppercase mb-1 fw-bold">Sản phẩm sắp hết</h6>
                        <h3 class="mb-0 fw-bold">Cảnh báo</h3>
                        <i class="fa-solid fa-triangle-exclamation icon-bg"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card stat-card card-info h-100">
                    <div class="card-body">
                        <h6 class="text-uppercase mb-1 fw-bold">Khách hàng mới</h6>
                        <h3 class="mb-0 fw-bold">Phát triển</h3>
                        <i class="fa-solid fa-users icon-bg"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="card data-card h-100">
                    <div class="card-header text-primary">
                        <i class="fa-solid fa-chart-line me-2"></i>Biểu đồ Doanh thu (7 ngày qua)
                    </div>
                    <div class="card-body">
                        <canvas id="revenueChart" height="100"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4 mb-4">
                <div class="card data-card h-100">
                    <div class="card-header text-danger">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>Sản phẩm sắp hết hàng
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0" id="lowStockTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>Sản phẩm</th>
                                        <th class="text-end">Tồn kho</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Populated via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/security.js"></script>
    <script src="/js/site.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
