<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - MiniShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/global-theme.css" />
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Rendered by site.js -->
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="topbar">
                <h3 class="fw-bold mb-0 text-gradient">Tổng quan hệ thống</h3>
                <div class="user-profile d-flex align-items-center">
                    <!-- Rendered by site.js -->
                </div>
            </header>

            <div class="content-wrapper">
                <!-- 4 Stat Cards -->
                <div class="row mb-4">
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="glass-card h-100 p-3 position-relative overflow-hidden">
                    <h6 class="text-uppercase mb-1 text-muted fw-bold">Doanh thu hôm nay</h6>
                    <h3 class="mb-0 fw-bold text-gradient" id="todayRevenue">0đ</h3>
                    <i class="fa-solid fa-sack-dollar position-absolute" style="right:-10px; bottom:-10px; font-size:4rem; opacity:0.1; color:var(--primary);"></i>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="glass-card h-100 p-3 position-relative overflow-hidden">
                    <h6 class="text-uppercase mb-1 text-muted fw-bold">Đơn hàng mới</h6>
                    <h3 class="mb-0 fw-bold text-success" id="todayOrders">0</h3>
                    <i class="fa-solid fa-cart-shopping position-absolute" style="right:-10px; bottom:-10px; font-size:4rem; opacity:0.1; color:var(--success);"></i>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="glass-card h-100 p-3 position-relative overflow-hidden">
                    <h6 class="text-uppercase mb-1 text-muted fw-bold">Sản phẩm sắp hết</h6>
                    <h3 class="mb-0 fw-bold text-warning">Cảnh báo</h3>
                    <i class="fa-solid fa-triangle-exclamation position-absolute" style="right:-10px; bottom:-10px; font-size:4rem; opacity:0.1; color:var(--warning);"></i>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="glass-card h-100 p-3 position-relative overflow-hidden">
                    <h6 class="text-uppercase mb-1 text-muted fw-bold">Khách hàng mới</h6>
                    <h3 class="mb-0 fw-bold text-info">Phát triển</h3>
                    <i class="fa-solid fa-users position-absolute" style="right:-10px; bottom:-10px; font-size:4rem; opacity:0.1; color:var(--info);"></i>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="glass-card h-100 p-3">
                    <div class="mb-3 text-gradient fw-bold fs-5">
                        <i class="fa-solid fa-chart-line me-2"></i>Biểu đồ Doanh thu (7 ngày qua)
                    </div>
                    <div>
                        <canvas id="revenueChart" height="100"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4 mb-4">
                <div class="glass-card h-100 p-3">
                    <div class="mb-3 text-warning fw-bold fs-5">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>Sắp hết hàng
                    </div>
                    <div class="table-responsive">
                        <table class="table mb-0" id="lowStockTable">
                            <thead>
                                <tr>
                                    <th>Sản phẩm</th>
                                    <th class="text-end">Tồn kho</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
            </div>
    </div>
</div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/security.js"></script>
    <script src="/js/site.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
