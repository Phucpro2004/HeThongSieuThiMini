<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sản phẩm - MiniShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #ffffff; /* Override by site.js */
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            color: #333;
            z-index: 1000;
        }
        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        /* Data Card */
        .data-card {
            background: white;
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .data-card .card-header {
            background-color: white;
            border-bottom: 1px solid #eee;
            border-radius: 10px 10px 0 0;
            padding: 20px;
            font-weight: 700;
        }
        
        /* Header */
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        
        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <!-- Rendered by site.js -->
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0 text-dark">Quản lý Sản phẩm</h3>
            <div class="user-profile d-flex align-items-center">
                <!-- Rendered by site.js -->
            </div>
        </header>

        <div class="card data-card mb-4">
            <div class="card-header text-primary d-flex justify-content-between align-items-center">
                <span><i class="fa-solid fa-box-open me-2"></i>Danh sách Sản phẩm</span>
                <button class="btn btn-primary rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#productModal" onclick="openAddModal()">
                    <i class="fa-solid fa-plus me-1"></i> Thêm Sản phẩm
                </button>
            </div>
            <div class="card-body mt-3">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-search text-muted"></i></span>
                            <input type="text" id="searchInput" class="form-control border-start-0 bg-light" placeholder="Tìm kiếm tên, mã vạch..." onkeyup="handleSearch(event)">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select id="categoryFilter" class="form-select bg-light" onchange="filterByCategory()">
                            <option value="">Tất cả danh mục</option>
                            <!-- Populated via JS -->
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="productsTable">
                        <thead class="table-light">
                            <tr>
                                <th>Ảnh</th>
                                <th>Mã vạch</th>
                                <th>Tên sản phẩm</th>
                                <th>Danh mục</th>
                                <th>Giá bán</th>
                                <th>Tồn kho</th>
                                <th class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow" style="border-radius: 12px;">
          <div class="modal-header bg-light border-0" style="border-radius: 12px 12px 0 0;">
            <h5 class="modal-title font-weight-bold text-primary" id="productModalTitle"><i class="fa-solid fa-box me-2"></i>Thêm Sản Phẩm</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-medium">Tên sản phẩm</label>
                        <input type="text" class="form-control" id="productName" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-medium">Mã vạch (Barcode)</label>
                        <input type="text" class="form-control" id="productBarcode" required>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-medium">Danh mục</label>
                        <select class="form-select" id="productCategoryId" required>
                            <!-- Populated via JS -->
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-medium">Giá bán (VNĐ)</label>
                        <input type="number" class="form-control" id="productPrice" required>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-medium">Tồn kho</label>
                        <input type="number" class="form-control" id="productStock" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-medium">Ảnh minh họa</label>
                        <div class="d-flex align-items-center gap-2">
                            <img id="imagePreview" src="https://via.placeholder.com/50" class="rounded border" style="width: 50px; height: 50px; object-fit: cover;" alt="Preview">
                            <input type="file" class="form-control" id="productImageFile" accept="image/*" onchange="previewImage(event)">
                            <input type="hidden" id="productImage">
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-primary w-100 py-2 rounded-pill fw-bold mt-2" onclick="saveProduct()">LƯU SẢN PHẨM</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/security.js"></script>
    <script src="/js/site.js"></script>
    <script src="/js/product.js"></script>
</body>
</html>
