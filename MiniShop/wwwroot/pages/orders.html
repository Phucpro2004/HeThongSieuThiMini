<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch sử Hóa đơn - MiniShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/global-theme.css" />
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Rendered by site.js -->
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="topbar">
                <h3 class="fw-bold mb-0 text-gradient">Lịch sử Hóa đơn</h3>
                <div class="user-profile d-flex align-items-center">
                    <!-- Rendered by site.js -->
                </div>
            </header>

            <div class="content-wrapper">
                <div class="glass-card mb-4">
                    <div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center" style="border-color: var(--glass-border) !important;">
                        <span class="fs-5 fw-bold text-primary"><i class="fa-solid fa-receipt me-2"></i>Danh sách Hóa đơn Bán hàng</span>
                    </div>
                    <div class="p-4">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-search text-muted"></i></span>
                            <input type="text" id="searchInput" class="form-control border-start-0 bg-light" placeholder="Tìm kiếm mã hóa đơn..." onkeyup="handleSearch(event)">
                        </div>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="ordersTable">
                        <thead class="">
                            <tr>
                                <th>Mã HĐ</th>
                                <th>Thời gian</th>
                                <th>Khách hàng</th>
                                <th>Thu ngân</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                                <th class="text-center">Chi tiết</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
            </div>
    </div>
</div>

    <!-- Order Detail Modal -->
    <div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0">
            <h5 class="modal-title font-weight-bold text-gradient"><i class="fa-solid fa-file-invoice me-2"></i>Chi tiết Hóa đơn #<span id="modalOrderId"></span></h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <div class="row mb-4">
                <div class="col-md-6">
                    <p class="mb-1 text-muted">Thời gian:</p>
                    <p class="fw-bold" id="modalOrderDate">-</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="mb-1 text-muted">Tổng tiền:</p>
                    <p class="fw-bold text-success fs-5" id="modalOrderTotal">-</p>
                </div>
            </div>
            <h6 class="fw-bold mb-3 border-bottom pb-2">Danh sách Sản phẩm</h6>
            <div class="table-responsive">
                <table class="table table-sm align-middle" id="orderItemsTable">
                    <thead class="">
                        <tr>
                            <th>Sản phẩm</th>
                            <th class="text-center">SL</th>
                            <th class="text-end">Đơn giá</th>
                            <th class="text-end">Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Items here -->
                    </tbody>
                </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/security.js"></script>
    <script src="/js/site.js"></script>
    <script src="/js/orders.js"></script>
</body>
</html>
