<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Danh mục - MiniShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #ffffff; /* Sẽ được override bởi site.js */
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            color: #333;
            z-index: 1000;
        }
        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        /* Data Card */
        .data-card {
            background: white;
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .data-card .card-header {
            background-color: white;
            border-bottom: 1px solid #eee;
            border-radius: 10px 10px 0 0;
            padding: 20px;
            font-weight: 700;
        }
        
        /* Header */
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <!-- Rendered by site.js -->
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0 text-dark">Quản lý Danh mục</h3>
            <div class="user-profile d-flex align-items-center">
                <!-- Rendered by site.js -->
            </div>
        </header>

        <div class="card data-card mb-4">
            <div class="card-header text-primary d-flex justify-content-between align-items-center">
                <span><i class="fa-solid fa-folder-open me-2"></i>Danh sách Danh mục</span>
                <button class="btn btn-primary rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#categoryModal" onclick="openAddModal()">
                    <i class="fa-solid fa-plus me-1"></i> Thêm Danh mục
                </button>
            </div>
            <div class="card-body p-0 mt-3">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="categoriesTable">
                        <thead class="table-light">
                            <tr>
                                <th width="10%">ID</th>
                                <th width="30%">Tên Danh mục</th>
                                <th width="45%">Mô tả</th>
                                <th width="15%" class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Category Modal -->
    <div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content border-0 shadow" style="border-radius: 12px;">
          <div class="modal-header bg-light border-0" style="border-radius: 12px 12px 0 0;">
            <h5 class="modal-title font-weight-bold text-primary" id="categoryModalTitle"><i class="fa-solid fa-folder-plus me-2"></i>Thêm Danh Mục</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <form id="categoryForm">
                <input type="hidden" id="categoryId">
                <div class="mb-3">
                    <label class="form-label text-muted fw-medium">Tên Danh mục</label>
                    <input type="text" class="form-control" id="categoryName" required placeholder="Ví dụ: Đồ gia dụng">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-medium">Mô tả</label>
                    <textarea class="form-control" id="categoryDescription" rows="3" placeholder="Mô tả danh mục..."></textarea>
                </div>
                <button type="button" class="btn btn-primary w-100 py-2 rounded-pill fw-bold" onclick="saveCategory()">LƯU DANH MỤC</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/security.js"></script>
    <script src="/js/site.js"></script>
    <script src="/js/category.js"></script>
</body>
</html>
