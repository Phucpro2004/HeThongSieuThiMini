<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Danh mục - MiniShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/global-theme.css" />
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Rendered by site.js -->
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="topbar">
                <h3 class="fw-bold mb-0 text-gradient">Quản lý Danh mục</h3>
                <div class="user-profile d-flex align-items-center">
                    <!-- Rendered by site.js -->
                </div>
            </header>

            <div class="content-wrapper">
                <div class="glass-card mb-4">
                    <div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center" style="border-color: var(--glass-border) !important;">
                        <span class="fs-5 fw-bold text-primary"><i class="fa-solid fa-folder-open me-2"></i>Danh sách Danh mục</span>
                        <button class="btn btn-primary rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#categoryModal" onclick="openAddModal()">
                            <i class="fa-solid fa-plus me-1"></i> Thêm Danh mục
                        </button>
                    </div>
                    <div class="p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="categoriesTable">
                        <thead class="">
                            <tr>
                                <th width="10%">ID</th>
                                <th width="30%">Tên Danh mục</th>
                                <th width="45%">Mô tả</th>
                                <th width="15%" class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
            </div>
    </div>
</div>

    <!-- Add/Edit Category Modal -->
    <div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0">
            <h5 class="modal-title font-weight-bold text-gradient" id="categoryModalTitle"><i class="fa-solid fa-folder-plus me-2"></i>Thêm Danh Mục</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <form id="categoryForm">
                <input type="hidden" id="categoryId">
                <div class="mb-3">
                    <label class="form-label text-muted fw-medium">Tên Danh mục</label>
                    <input type="text" class="form-control" id="categoryName" required placeholder="Ví dụ: Đồ gia dụng">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-medium">Mô tả</label>
                    <textarea class="form-control" id="categoryDescription" rows="3" placeholder="Mô tả danh mục..."></textarea>
                </div>
                <button type="button" class="btn btn-primary w-100 py-2 rounded-pill fw-bold" onclick="saveCategory()">LƯU DANH MỤC</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/security.js"></script>
    <script src="/js/site.js"></script>
    <script src="/js/category.js"></script>
</body>
</html>
