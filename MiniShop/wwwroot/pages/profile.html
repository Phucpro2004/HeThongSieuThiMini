<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | MiniShop</title>
    <link rel="stylesheet" href="../css/style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 100px auto 50px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }
        .profile-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }
        .profile-tabs button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 10px;
            position: relative;
            transition: color 0.3s;
        }
        .profile-tabs button.active {
            color: var(--primary);
            font-weight: 600;
        }
        .profile-tabs button.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .orders-table th, .orders-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .orders-table th {
            color: var(--secondary);
            font-weight: 600;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-processing { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .status-shipped { background: rgba(23, 162, 184, 0.2); color: #17a2b8; }
        .status-delivered { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .status-cancelled { background: rgba(220, 53, 69, 0.2); color: #dc3545; }
        .status-paid { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .status-pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }

        @media (max-width: 900px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">MiniShop.</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
            </ul>
        </nav>
        <div class="nav-actions">
            <div id="user-section" style="display: flex; gap: 15px; align-items: center; margin-right: 20px;">
                <!-- Filled via JS -->
            </div>
        </div>
    </header>

    <div class="profile-container">
        <h2 style="margin-bottom: 20px; color: white;">My Dashboard</h2>
        
        <div class="profile-tabs">
            <button class="active" data-target="profile-tab">Profile Info</button>
            <button data-target="orders-tab">Order History</button>
        </div>

        <div id="profile-tab" class="tab-content active">
            <form id="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="prof-fullname" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="prof-email" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="prof-phone" placeholder="Enter phone number">
                    </div>
                    <div class="form-group">
                        <label>Delivery Address</label>
                        <input type="text" id="prof-address" placeholder="Enter delivery address">
                    </div>
                </div>
                <p id="profile-msg" style="margin-top: 10px; font-weight: 600;"></p>
                <button type="submit" class="btn btn-primary" style="margin-top: 15px;">Save Profile</button>
            </form>
        </div>

        <div id="orders-tab" class="tab-content">
            <div style="overflow-x: auto; width: 100%;">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Total Amount</th>
                            <th>Payment Method</th>
                            <th>Payment Status</th>
                            <th>Order Status</th>
                            <th>Items</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/profile.js"></script>
</body>
</html>
